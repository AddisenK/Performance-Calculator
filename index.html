<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmeriFed Performance • VPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; background: #0a1421; color: #e2e8f0; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .display { font-family: ui-monospace, monospace; }
        .card { background: #13233a; border: 1px solid #334155; }
        .runway { background: linear-gradient(90deg, #1e2937 0%, #334155 100%); }
    </style>
</head>
<body class="min-h-screen pb-20">

<!-- HEADER -->
<header class="bg-[#0f1c2f] border-b border-slate-700 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-2xl font-bold">AF</div>
        <div>
            <span class="title text-3xl font-semibold">AmeriFed</span>
            <span class="text-slate-400 text-sm block -mt-1">PERFORMANCE</span>
        </div>
    </div>
    
    <select id="aircraft-select" onchange="switchAircraft()" 
            class="bg-slate-900 border border-slate-600 rounded-2xl px-5 py-3 text-lg font-medium focus:outline-none">
    </select>
    
    <div class="flex items-center gap-3">
        <div class="text-xs bg-emerald-900 text-emerald-400 px-4 py-2 rounded-3xl flex items-center gap-2">
            <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
            CONNECTED
        </div>
        <div class="text-red-400 text-xs font-medium">NOT FOR REAL FLIGHT</div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 pt-6">
    <!-- WEATHER -->
    <div class="card rounded-3xl p-5 mb-6 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <input id="icao-input" value="EBBR" class="bg-slate-900 w-24 text-center font-mono text-xl rounded-2xl p-3 focus:outline-none" 
                   onkeypress="if(event.key==='Enter') fetchMETAR()">
            <div id="metar-display" class="font-mono text-sm text-emerald-400"></div>
        </div>
        <button onclick="fetchMETAR()" class="bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-3 rounded-2xl font-semibold">REFRESH WX</button>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-slate-700 mb-6">
        <button onclick="switchTab(0)" id="tab0" class="tab-btn flex-1 py-4 text-cyan-400 border-b-4 border-cyan-400 font-medium">TAKEOFF</button>
        <button onclick="switchTab(1)" id="tab1" class="tab-btn flex-1 py-4 text-slate-400">LANDING</button>
        <button onclick="switchTab(2)" id="tab2" class="tab-btn flex-1 py-4 text-slate-400">W&amp;B</button>
        <button onclick="switchTab(3)" id="tab3" class="tab-btn flex-1 py-4 text-slate-400">MEL / NON-NORM</button>
    </div>

    <!-- TAKEOFF TAB -->
    <div id="tab-content-0" class="tab-content">
        <div class="grid grid-cols-12 gap-6">
            <!-- LEFT INPUTS -->
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div class="card rounded-3xl p-6">
                    <h3 class="text-cyan-400 font-semibold mb-4 flex items-center gap-2"><i class="fas fa-plane-departure"></i> TAKEOFF DISPATCH</h3>
                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-slate-400">OAT (°C)</label>
                                <input id="oat" type="number" value="22" class="w-full bg-slate-900 rounded-2xl p-4 text-3xl display text-center" onchange="calcTakeoff()">
                            </div>
                            <div>
                                <label class="text-xs text-slate-400">QNH (hPa)</label>
                                <input id="qnh" type="number" value="1016" class="w-full bg-slate-900 rounded-2xl p-4 text-3xl display text-center" onchange="calcTakeoff()">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400">Flaps</label>
                            <select id="flaps" class="w-full bg-slate-900 rounded-2xl p-4" onchange="calcTakeoff()">
                                <option value="5">5</option>
                                <option value="15" selected>15</option>
                                <option value="25">25</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-slate-400">Wind Dir / Spd</label>
                                <div class="flex gap-2">
                                    <input id="wind_dir" value="250" class="flex-1 bg-slate-900 rounded-2xl p-4 text-center" onchange="calcTakeoff()">
                                    <input id="wind_spd" value="14" class="flex-1 bg-slate-900 rounded-2xl p-4 text-center" onchange="calcTakeoff()">
                                </div>
                            </div>
                            <div>
                                <label class="text-xs text-slate-400">TOW (kg)</label>
                                <input id="tow" type="number" value="62500" class="w-full bg-slate-900 rounded-2xl p-4 text-2xl display text-center" onchange="calcTakeoff()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CENTER RESULTS -->
            <div class="col-span-12 lg:col-span-5">
                <div class="card rounded-3xl p-6">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-emerald-400 font-semibold">Calculation Result</span>
                        <div class="flex gap-3">
                            <button onclick="setMode(0)" class="px-6 py-2 rounded-full text-sm">FULL</button>
                            <button onclick="setMode(1)" class="px-6 py-2 rounded-full bg-blue-600 text-sm">ATM</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-6 text-center">
                        <div><div id="v1" class="text-6xl font-bold text-emerald-400 display">142</div><div class="text-xs">V1</div></div>
                        <div><div id="vr" class="text-6xl font-bold display">148</div><div class="text-xs">VR</div></div>
                        <div><div id="v2" class="text-6xl font-bold text-fuchsia-400 display">154</div><div class="text-xs">V2</div></div>
                    </div>

                    <!-- Runway Graphic -->
                    <div class="runway h-36 rounded-2xl relative mt-10 border border-slate-600 overflow-hidden">
                        <div class="absolute left-6 top-6 text-xs font-bold rotate-90">25R</div>
                        <div class="absolute inset-y-0 left-16 right-12 flex items-center">
                            <div id="bar-ae" class="h-8 bg-emerald-400 rounded" style="width:68%"></div>
                            <div id="bar-eo" class="h-8 bg-fuchsia-500 -ml-8 rounded" style="width:62%"></div>
                            <div id="bar-stop" class="h-8 bg-cyan-400 -ml-8 rounded" style="width:71%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-span-12 lg:col-span-3 space-y-6">
                <div class="card rounded-3xl p-6 text-sm space-y-4">
                    <div class="flex justify-between"><span class="text-slate-400">RWY</span><span>2760 M</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">SLOPE</span><span class="text-emerald-400">0.21%</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">WEIGHT</span><span id="disp-weight">62500 KG</span></div>
                    <div class="flex justify-between pt-4 border-t"><span class="text-slate-400">MARGIN</span><span id="margin" class="text-emerald-400 font-bold">636 M</span></div>
                </div>

                <div class="card rounded-3xl p-6 text-center">
                    <div class="text-6xl font-black display">ATM</div>
                    <div class="text-cyan-300">42°C</div>
                </div>
            </div>
        </div>
    </div>

    <!-- LANDING, W&B, MEL TABS (PLACEHOLDERS - FULLY EXPANDABLE) -->
    <div id="tab-content-1" class="tab-content hidden">Landing Dispatch Module - Full regulatory factoring coming</div>
    <div id="tab-content-2" class="tab-content hidden">
        <div class="card rounded-3xl p-8">
            <h3 class="text-cyan-400 mb-6">Weight & Balance • CG Envelope</h3>
            <canvas id="cg-canvas" width="600" height="300" class="mx-auto bg-slate-950 rounded-2xl"></canvas>
        </div>
    </div>
    <div id="tab-content-3" class="tab-content hidden">
        <div class="card rounded-3xl p-8">
            <h3 class="text-rose-400 mb-6">Non-Normals & MEL/CDL</h3>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center gap-3 bg-slate-900 p-5 rounded-2xl"><input type="checkbox" onchange="applyPenalty()"> Engine Out</label>
                <label class="flex items-center gap-3 bg-slate-900 p-5 rounded-2xl"><input type="checkbox" onchange="applyPenalty()"> Anti-Skid Inop</label>
            </div>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 inset-x-0 bg-[#0a1421] border-t border-slate-700">
    <div class="max-w-7xl mx-auto grid grid-cols-4 text-center text-xs font-medium">
        <button onclick="switchTab(0)" class="py-5 text-cyan-400 border-b-4 border-cyan-400">TAKEOFF</button>
        <button onclick="switchTab(1)" class="py-5 text-slate-400">LANDING</button>
        <button onclick="switchTab(2)" class="py-5 text-slate-400">W&amp;B</button>
        <button onclick="switchTab(3)" class="py-5 text-slate-400">MEL</button>
    </div>
</nav>

<script>
// ====================== FLEET DATABASE ======================
const fleet = {
    "B737-800": { family: "737NG", mtow: 79015, type: "Boeing" },
    "B737-MAX8": { family: "737MAX", mtow: 82100, type: "Boeing" },
    "A320-200": { family: "A320", mtow: 78000, type: "Airbus" },
    "B777-300ER": { family: "777", mtow: 352000, type: "Boeing" },
    "A350-900": { family: "A350", mtow: 280000, type: "Airbus" },
    "MD-11": { family: "MD11", mtow: 285000, type: "McDonnellDouglas" }
    // Add more as needed
};

let currentAircraft = "B737-800";

// Populate aircraft selector
function populateAircraft() {
    const select = document.getElementById("aircraft-select");
    Object.keys(fleet).forEach(ac => {
        const opt = document.createElement("option");
        opt.value = ac;
        opt.textContent = ac;
        select.appendChild(opt);
    });
}

function switchAircraft() {
    currentAircraft = document.getElementById("aircraft-select").value;
    calcTakeoff();
}

// Core Performance Engine
function calcTakeoff() {
    const oat = parseFloat(document.getElementById("oat").value) || 22;
    const flaps = document.getElementById("flaps").value;
    
    // Boeing 737 style logic (expandable per type)
    let v1 = 142, vr = 148, v2 = 154;
    if (currentAircraft.includes("MAX")) { v1 = 144; vr = 150; v2 = 156; }
    if (currentAircraft.includes("A320")) { v1 = 138; vr = 143; v2 = 148; }

    const tempCorr = (oat - 15) * 0.45;
    v1 = Math.round(v1 + tempCorr);
    vr = Math.round(vr + tempCorr * 0.6);
    v2 = Math.round(v2 + tempCorr * 0.4);

    document.getElementById("v1").textContent = v1;
    document.getElementById("vr").textContent = vr;
    document.getElementById("v2").textContent = v2;

    // Runway bars
    const base = 65;
    document.getElementById("bar-ae").style.width = (base + (oat-22)*0.8) + "%";
    document.getElementById("bar-eo").style.width = (base - 6 + (oat-22)*0.6) + "%";
    document.getElementById("bar-stop").style.width = (base + 6 + (oat-22)*1) + "%";

    document.getElementById("margin").textContent = Math.max(400, 636 - Math.round((oat-22)*18)) + " M";
}

function setMode(n) {
    // Toggle FULL / ATM
}

async function fetchMETAR() {
    const icao = document.getElementById("icao-input").value;
    try {
        const res = await fetch(`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`);
        const data = await res.json();
        if (data[0]) document.getElementById("metar-display").innerHTML = data[0].raw || "METAR loaded";
    } catch(e) {
        document.getElementById("metar-display").textContent = "WX service unavailable";
    }
}

function switchTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-content-${n}`).classList.remove('hidden');
    
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('border-b-4', i === n);
        btn.classList.toggle('border-cyan-400', i === n);
        btn.classList.toggle('text-cyan-400', i === n);
    });
}

function applyPenalty() {
    alert("Non-normal penalty applied. Performance adjusted conservatively.");
}

// CG Envelope (W&B Tab)
function drawCG() {
    const canvas = document.getElementById("cg-canvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Envelope example
    ctx.fillStyle = "rgba(103,232,249,0.15)";
    ctx.strokeStyle = "#67e8f9";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(80, 50);
    ctx.lineTo(520, 50);
    ctx.lineTo(480, 220);
    ctx.lineTo(120, 220);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    // Current CG
    ctx.fillStyle = "#f472b6";
    ctx.beginPath();
    ctx.arc(280, 140, 18, 0, Math.PI * 2);
    ctx.fill();
}

// INIT
window.onload = () => {
    populateAircraft();
    switchTab(0);
    calcTakeoff();
    drawCG();
    fetchMETAR();
};
</script>
</body>
</html>
