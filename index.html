<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmeriFed • VPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; background: #0a1421; }
        .display { font-family: ui-monospace, monospace; }
        .runway-bg { background: linear-gradient(90deg, #1e2937, #334155); }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-20">

<div class="max-w-7xl mx-auto p-6">
    <!-- Header -->
    <div class="bg-[#0f1c2f] border-b border-slate-700 px-6 py-4 flex justify-between items-center rounded-t-3xl">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 px-5 py-2 rounded-2xl font-semibold">B737-800W 26K / CFM56-7B26</div>
            <div class="text-red-400 text-sm font-medium">NOT FOR REAL FLIGHT</div>
        </div>
        <div class="text-slate-400">Welcome, FO Sacha Durré</div>
    </div>

    <div class="grid grid-cols-12 gap-6 mt-6">
        <!-- Left Inputs -->
        <div class="col-span-12 lg:col-span-4 space-y-6">
            <div class="bg-[#13233a] rounded-3xl p-6">
                <h3 class="text-cyan-400 mb-4 font-semibold">Environmental</h3>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs text-slate-400">OAT (°C)</label>
                        <input id="oat" type="number" value="22" class="w-full bg-slate-900 rounded-2xl p-4 text-3xl display text-center" onchange="compute()">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">QNH (hPa)</label>
                        <input id="qnh" type="number" value="1016" class="w-full bg-slate-900 rounded-2xl p-4 text-3xl display text-center" onchange="compute()">
                    </div>
                </div>
                <div class="mt-6">
                    <label class="text-xs text-slate-400">Flaps</label>
                    <select id="flaps" class="w-full bg-slate-900 rounded-2xl p-4" onchange="compute()">
                        <option value="5">Flaps 5</option>
                        <option value="15" selected>Flaps 15</option>
                        <option value="25">Flaps 25</option>
                    </select>
                </div>
                <div class="mt-6">
                    <label class="text-xs text-slate-400">Wind (HDG / kt)</label>
                    <div class="flex gap-3">
                        <input id="wind_dir" value="250" class="flex-1 bg-slate-900 rounded-2xl p-4 text-center" onchange="compute()">
                        <input id="wind_spd" value="14" class="flex-1 bg-slate-900 rounded-2xl p-4 text-center" onchange="compute()">
                    </div>
                </div>
            </div>

            <div class="bg-[#13233a] rounded-3xl p-6">
                <h3 class="text-amber-400 mb-3 font-semibold">Engine Failure Procedure</h3>
                <p class="text-slate-300">Climb Straight Ahead (244°) to MSA.</p>
            </div>
        </div>

        <!-- Center Results -->
        <div class="col-span-12 lg:col-span-5">
            <div class="bg-[#13233a] rounded-3xl p-6">
                <div class="flex justify-between mb-6">
                    <span class="text-emerald-400 font-semibold">Takeoff Dispatch • ATM</span>
                    <div class="flex gap-2">
                        <button onclick="toggleMode(0)" class="px-5 py-1 text-sm rounded-full">FULL</button>
                        <button onclick="toggleMode(1)" id="atm-btn" class="px-5 py-1 text-sm rounded-full bg-blue-600">ATM</button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-8 text-center mb-10">
                    <div>
                        <div id="v1-val" class="text-6xl font-bold text-emerald-400 display">142</div>
                        <div class="text-xs text-slate-400">V1</div>
                    </div>
                    <div>
                        <div id="vr-val" class="text-6xl font-bold text-white display">148</div>
                        <div class="text-xs text-slate-400">VR</div>
                    </div>
                    <div>
                        <div id="v2-val" class="text-6xl font-bold text-fuchsia-400 display">154</div>
                        <div class="text-xs text-slate-400">V2</div>
                    </div>
                </div>

                <!-- Runway Graphic -->
                <div class="runway-bg h-36 rounded-2xl relative border border-slate-500 overflow-hidden">
                    <div class="absolute left-6 top-6 text-xs font-bold rotate-90">25R</div>
                    
                    <div class="absolute inset-0 flex items-center px-12">
                        <div id="bar-ae" class="h-7 bg-emerald-400 rounded-r transition-all" style="width:68%"></div>
                        <div id="bar-eo" class="h-7 bg-fuchsia-500 -ml-8 rounded-r transition-all" style="width:62%"></div>
                        <div id="bar-stop" class="h-7 bg-cyan-400 -ml-8 rounded-r transition-all" style="width:71%"></div>
                    </div>
                    
                    <div class="absolute bottom-4 left-1/4 text-xs text-emerald-400">AE-GO</div>
                    <div class="absolute bottom-4 left-1/2 text-xs text-fuchsia-400">EO-GO</div>
                    <div class="absolute bottom-4 right-1/3 text-xs text-cyan-400">ACCEL-STOP</div>
                </div>
            </div>
        </div>

        <!-- Right Info -->
        <div class="col-span-12 lg:col-span-3 space-y-6">
            <div class="bg-[#13233a] rounded-3xl p-6 text-sm space-y-4 border border-slate-600">
                <div class="flex justify-between"><span class="text-slate-400">RWY</span><span>2760 M</span></div>
                <div class="flex justify-between"><span class="text-slate-400">SLOPE</span><span class="text-emerald-400">0.21%</span></div>
                <div class="flex justify-between"><span class="text-slate-400">WEIGHT</span><span id="disp-weight">62500 KG</span></div>
                <div class="pt-4 border-t border-slate-600 flex justify-between">
                    <span class="text-slate-400">MARGIN</span>
                    <span id="margin-val" class="text-emerald-400 font-bold">636 M</span>
                </div>
            </div>

            <div class="bg-[#13233a] rounded-3xl p-8 text-center border border-slate-600">
                <div class="text-7xl font-black display text-white/90">ATM</div>
                <div class="text-cyan-300 mt-2">42°C</div>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 bg-[#0a1421] border-t border-slate-700 py-3">
    <div class="max-w-7xl mx-auto grid grid-cols-5 text-center text-[10px]">
        <button class="text-cyan-400 border-b-4 border-cyan-400 pb-3">Takeoff Dispatch</button>
        <button class="text-slate-400">Landing Dispatch</button>
        <button class="text-slate-400">Landing Enroute</button>
        <button class="text-slate-400">Weight & Balance</button>
        <button class="text-slate-400">MEL</button>
    </div>
</nav>

<script>
// ====================== HIGH-FIDELITY B737-800 ENGINE ======================

const B738_DATA = {
    mtow: 79015,
    flaps: {
        "5":  { baseV1: 145, baseVR: 150, baseV2: 156, distFactor: 1.00 },
        "15": { baseV1: 142, baseVR: 148, baseV2: 154, distFactor: 0.92 },
        "25": { baseV1: 138, baseVR: 144, baseV2: 150, distFactor: 0.88 }
    }
};

function pressureAltitude(elev_ft, qnh) {
    return elev_ft + (1013.25 - qnh) * 27;
}

function densityAltitude(pa, oat) {
    const isa = 15 - 0.0019812 * pa;
    return pa + 120 * (oat - isa);
}

function windComponents(runwayHdg, windDir, windSpd) {
    const diff = (windDir - runwayHdg) * Math.PI / 180;
    const hw = Math.round(windSpd * Math.cos(diff));
    const xw = Math.round(windSpd * Math.sin(diff));
    return { hw, xw };
}

function compute() {
    const oat = parseFloat(document.getElementById("oat").value) || 22;
    const qnh = parseFloat(document.getElementById("qnh").value) || 1016;
    const flaps = document.getElementById("flaps").value;
    const windDir = parseFloat(document.getElementById("wind_dir").value) || 250;
    const windSpd = parseFloat(document.getElementById("wind_spd").value) || 14;

    const data = B738_DATA.flaps[flaps];
    
    // Conservative corrections
    const tempCorrection = (oat - 15) * 0.8;
    const v1 = Math.round(data.baseV1 + tempCorrection * 0.3);
    const vr = Math.round(data.baseVR + tempCorrection * 0.2);
    const v2 = Math.round(data.baseV2 + tempCorrection * 0.15);

    // Distances (conservative)
    let baseDist = 1950 * data.distFactor;
    const distCorrection = (oat - 15) * 18 + (1013 - qnh) * 12;
    const aeGo = Math.round(baseDist + distCorrection);
    const eoGo = Math.round(aeGo * 0.97);
    const accelStop = Math.round(aeGo * 1.04);

    const margin = Math.round(2760 - Math.max(aeGo, eoGo, accelStop));

    // Update UI
    document.getElementById("v1-val").textContent = v1;
    document.getElementById("vr-val").textContent = vr;
    document.getElementById("v2-val").textContent = v2;
    
    document.getElementById("bar-ae").style.width = (65 + (oat-22)*0.6) + "%";
    document.getElementById("bar-eo").style.width = (60 + (oat-22)*0.5) + "%";
    document.getElementById("bar-stop").style.width = (70 + (oat-22)*0.7) + "%";

    document.getElementById("margin-val").textContent = Math.max(300, margin) + " M";
}

// Mode toggle
function toggleMode(m) {
    document.getElementById("atm-btn").classList.toggle("bg-blue-600", m === 1);
}

// Init
window.onload = () => {
    compute();
};
</script>
</body>
</html>
