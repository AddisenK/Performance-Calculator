<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmeriFed Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #0a1421;
            color: #e2e8f0;
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .card {
            background: #13233a;
            border: 1px solid #334155;
        }
        .display {
            font-family: ui-monospace, monospace;
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-fuchsia-500 rounded-2xl flex items-center justify-center text-2xl font-bold text-white shadow-lg">AF</div>
                <div>
                    <h1 class="title-font text-4xl font-semibold tracking-tight">AmeriFed Performance</h1>
                    <p class="text-slate-400 text-sm">Virtual Performance Tool</p>
                </div>
            </div>
            <div class="text-xs bg-emerald-900/50 text-emerald-400 px-4 py-2 rounded-2xl border border-emerald-700">
                <i class="fas fa-circle"></i> Connected
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Input Panel -->
            <div class="lg:col-span-5">
                <div class="card rounded-3xl p-8">
                    <h2 class="text-cyan-400 font-semibold text-xl mb-6 flex items-center gap-x-2">
                        <i class="fas fa-plane-departure"></i> Takeoff Calculation
                    </h2>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Aircraft</label>
                            <select id="aircraft" class="w-full bg-slate-900 border border-slate-600 rounded-2xl p-4 text-lg">
                                <option value="B737-800">Boeing 737-800</option>
                                <option value="B737-MAX8">Boeing 737 MAX 8</option>
                                <option value="A320-200">Airbus A320-200</option>
                                <option value="B777-300ER">Boeing 777-300ER</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-slate-400 mb-2">ICAO Airport</label>
                                <input id="icao" value="YSSY" 
                                       class="w-full bg-slate-900 border border-slate-600 rounded-2xl p-4 text-xl font-mono focus:outline-none focus:border-cyan-400">
                            </div>
                            <div>
                                <label class="block text-sm text-slate-400 mb-2">Runway</label>
                                <input id="runway" value="16R" 
                                       class="w-full bg-slate-900 border border-slate-600 rounded-2xl p-4 text-xl font-mono focus:outline-none focus:border-cyan-400">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm text-slate-400 mb-2">
